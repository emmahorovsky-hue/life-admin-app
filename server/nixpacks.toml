# Nixpacks build configuration for the life-admin-app server.
#
# BUILD CONTEXT IS THE MONOREPO ROOT (LIF-176) — the server depends on the
# local @life-admin/shared workspace package (packages/shared, unpublished),
# so a server-only build context cannot install: npm hits E404 trying to
# fetch @life-admin/shared from the registry. Installing from the workspace
# root resolves it via the root package-lock.json instead.
#
# Railway dashboard settings that must match this file:
#   - Service Root Directory: the repo root (leave EMPTY) — NOT "server".
#   - Config-as-code file path: "server/railway.json". That file points
#     Nixpacks back at this config via build.nixpacksConfigPath and sets
#     watchPatterns (server/**, packages/shared/**, root package.json and
#     package-lock.json) so pushes touching only client/ or mobile/ don't
#     redeploy the API.
#
# All commands below therefore run from the repository root.

[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

# `npm ci` against the root workspace lockfile, filtered to the server and its
# @life-admin/shared workspace dependency (skips client/mobile deps). This:
#   - links node_modules/@life-admin/shared -> packages/shared and runs its
#     `prepare` script, building the dist/ (CommonJS) the server consumes;
#   - runs the server's `postinstall` (prisma generate).
# --include=dev forces devDependencies (typescript, @types/*) to install even
# when the Railway service sets NODE_ENV=production. tsc needs them at build
# time; the runtime image only runs the compiled dist/, so the extra deps are
# harmless.
[phases.install]
cmds = ["npm ci --include=dev --workspace=server --workspace=packages/shared"]

[phases.build]
cmds = [
  "npm run prisma:generate --workspace=server",
  "npm run build --workspace=server"
]

# `prisma migrate deploy` runs the Prisma CLI at container start, not just at
# build — so `prisma` is a genuine RUNTIME dependency and must stay in
# server/package.json "dependencies". Moving it to devDependencies (it looks
# like a build-only tool, and has been proposed as such — LIF-153) would leave
# the deploy relying on `--include=dev` above happening to install it. That is
# working by accident: drop the flag, or prune dev deps from the runtime image,
# and the container fails on boot rather than at build, where it's harder to
# spot. `typescript` is genuinely build-only and does live in devDependencies.
[start]
cmd = "npm run prisma:migrate:deploy --workspace=server && npm run start --workspace=server"
