# Nixpacks build configuration for the life-admin-app server.
# This file is consumed when Railway's service Root Directory is set to "server"
# (recommended), which scopes Nixpacks to this Node.js project.

[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

# --include=dev forces devDependencies (TypeScript @types/*) to install even when
# the Railway service sets NODE_ENV=production. tsc needs them at build time; the
# runtime image only runs the compiled dist/, so the extra deps are harmless.
#
# Uses `npm install` (not `npm ci`): the per-package server/package-lock.json was
# removed in favour of the root workspace lockfile (packages/shared is now an npm
# workspace). With Railway's Root Directory set to "server" that root lockfile is
# not in the build context, so `npm ci` would fail ("no package-lock.json"). The
# server has no @life-admin/shared dependency, so `npm install` resolves cleanly
# from server/package.json alone.
[phases.install]
cmds = ["npm install --include=dev"]

[phases.build]
cmds = [
  "npx prisma generate",
  "npm run build"
]

# `prisma migrate deploy` runs the Prisma CLI at container start, not just at
# build — so `prisma` is a genuine RUNTIME dependency and must stay in
# server/package.json "dependencies". Moving it to devDependencies (it looks
# like a build-only tool, and has been proposed as such — LIF-153) would leave
# the deploy relying on `--include=dev` above happening to install it. That is
# working by accident: drop the flag, or prune dev deps from the runtime image,
# and the container fails on boot rather than at build, where it's harder to
# spot. `typescript` is genuinely build-only and does live in devDependencies.
[start]
cmd = "npm run prisma:migrate:deploy && npm start"
