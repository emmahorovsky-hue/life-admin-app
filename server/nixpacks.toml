# Nixpacks build configuration for the life-admin-app server.
# This file is consumed when Railway's service Root Directory is set to "server"
# (recommended), which scopes Nixpacks to this Node.js project.

[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

# --include=dev forces devDependencies (TypeScript @types/*) to install even when
# the Railway service sets NODE_ENV=production. tsc needs them at build time; the
# runtime image only runs the compiled dist/, so the extra deps are harmless.
[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = [
  "npx prisma generate",
  "npm run build"
]

[start]
cmd = "npm run prisma:migrate:deploy && npm start"
