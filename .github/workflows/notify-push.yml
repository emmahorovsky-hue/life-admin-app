name: Notify on Push to Main

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  notify-push:
    name: Spawn QA Agent on Push
    runs-on: ubuntu-latest

    steps:
      - name: Extract Linear ticket ID
        id: linear
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          TICKET=$(echo "$COMMIT_MESSAGE" | grep -oE 'LIF-[0-9]+' | head -1 || echo "")
          echo "ticket=$TICKET" >> "$GITHUB_OUTPUT"
          echo "Found ticket: $TICKET"

      - name: Notify OpenClaw Gateway
        if: steps.linear.outputs.ticket != ''
        env:
          GATEWAY_URL: ${{ secrets.OPENCLAW_GATEWAY_URL }}
          GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          TICKET: ${{ steps.linear.outputs.ticket }}
        run: |
          if [ -z "${GATEWAY_URL:-}" ] || [ -z "${GATEWAY_TOKEN:-}" ]; then
            echo "Gateway URL/token not configured; skipping notification."
            exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg agentId "main" \
            --arg ticket "$TICKET" \
            --arg commit_message "$COMMIT_MESSAGE" \
            --arg commit_url "$COMMIT_URL" \
            '{
              agentId: $agentId,
              message: ("Push to main for " + $ticket + "\n\nCommit: " + $commit_message + "\nURL: " + $commit_url + "\n\nSpawn QA agent to verify this change."),
              metadata: {
                source: "github_actions",
                ticket: $ticket,
                event: "push"
              }
            }')

          curl --fail --show-error --silent \
            -X POST "$GATEWAY_URL/api/sessions/message" \
            -H "Authorization: Bearer $GATEWAY_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD"
