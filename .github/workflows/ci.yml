name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  backend-lint-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    # Postgres for the Jest suite. globalSetup runs `prisma migrate deploy`
    # against this DB; setup.ts supplies JWT_SECRET etc., so no .env.test is
    # needed in CI — only DATABASE_URL.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lifeadmin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lifeadmin_test?schema=public
      JWT_SECRET: test-secret-key-for-ci
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # Install the whole workspace from the repo root so the hoisted tree and
      # the @life-admin/shared symlink are created (per-package lockfiles were
      # removed in the workspace conversion).
      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Apply database migrations
        run: npm run prisma:migrate:deploy

      - name: Run tests
        run: npm test

      - name: Check TypeScript compilation
        run: npx tsc --noEmit

  frontend-lint-test:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # Install the whole workspace from the repo root (see backend job note).
      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Build check
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3001

  mobile-shared-typecheck:
    name: Mobile & Shared Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # Install the whole workspace from the repo root (see backend job note).
      - name: Install dependencies
        run: npm ci

      - name: Typecheck packages/shared
        run: npm run typecheck --workspace=packages/shared

      - name: Typecheck mobile
        run: npm run typecheck --workspace=mobile

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lifeadmin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lifeadmin_test?schema=public
      JWT_SECRET: test-secret-key-for-ci
      NODE_ENV: test
      ENABLE_CRON: 'false'
      API_URL: http://localhost:3001
      CLIENT_URL: http://127.0.0.1:4173
      RESEND_API_KEY: test-dummy-key

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # One root install covers both server and client workspaces.
      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npm run prisma:migrate:deploy
        working-directory: ./server

      - name: Start backend (port 3001)
        run: |
          npm run dev > /tmp/server.log 2>&1 &
          # Wait for the API port to accept connections.
          for i in $(seq 1 30); do
            (echo > /dev/tcp/localhost/3001) >/dev/null 2>&1 && break
            sleep 2
          done
          (echo > /dev/tcp/localhost/3001) >/dev/null 2>&1 \
            || { echo "Backend failed to start:"; cat /tmp/server.log; exit 1; }
        working-directory: ./server

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: ./client

      # Playwright's webServer builds and serves the production bundle on 4173,
      # whose preview proxy forwards /api to the backend started above.
      - name: Run e2e tests
        run: npm run test:e2e
        working-directory: ./client

  env-file-guard:
    name: No committed .env files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Secrets must never be committed (LIF-149). Only .env.example templates
      # are allowed — the client/.env.production exception is gone (LIF-162).
      - name: Fail if a .env file is tracked
        run: |
          tracked=$(git ls-files | grep -E '(^|/)\.env(\.[^/]*)?$' \
            | grep -vE '(^|/)\.env\.example$' || true)
          if [ -n "$tracked" ]; then
            echo "::error::Tracked .env files found — secrets must never be committed:"
            echo "$tracked"
            exit 1
          fi

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Audit the whole workspace from the root lockfile — every workspace,
      # prod AND dev dependencies, failing at moderate and above.
      #
      # This step used to end in `|| true`, which swallowed the exit code and
      # made the job report success unconditionally (LIF-32). It is a real gate
      # now: a new moderate+ advisory anywhere in the tree turns the build red.
      #
      # Nothing is excluded from this gate. If a transitive advisory can't be
      # fixed by a version bump, pin the patched version through `overrides` in
      # the root package.json (see the `xcode`/`uuid` entry) rather than
      # raising --audit-level or reintroducing an escape hatch here.
      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      # Provenance, not CVEs: verifies every tarball in the lockfile still
      # matches the registry's signature. Catches a tampered or republished
      # package, which `npm audit` cannot see. Needs node_modules, but no
      # lifecycle scripts (nothing here builds or runs the app).
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify registry signatures
        run: npm audit signatures
