name: Agent Workflow Automation

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches: [ main ]

# Read-only permissions — all notification jobs are fire-and-forget curl calls.
permissions:
  contents: read
  pull-requests: read

jobs:
  trigger-reviewer:
    name: Spawn Reviewer Agent
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Extract Linear ticket ID
        id: linear
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          # Extract LIF-XX from PR title or branch name. Inputs are passed via
          # env vars (not inline ${{ }}) to avoid shell injection.
          # `|| echo ""` is intentional: grep returns non-zero when no ticket
          # is found, and we want an empty string in that case.
          TICKET=$(printf '%s %s' "$PR_TITLE" "$PR_HEAD_REF" | grep -oE 'LIF-[0-9]+' | head -1 || echo "")
          echo "ticket=$TICKET" >> "$GITHUB_OUTPUT"
          echo "Found ticket: $TICKET"

      - name: Notify OpenClaw Gateway
        if: steps.linear.outputs.ticket != ''
        env:
          GATEWAY_URL: ${{ secrets.OPENCLAW_GATEWAY_URL }}
          GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          TICKET: ${{ steps.linear.outputs.ticket }}
        run: |
          # Note: on the `pull_request` event, secrets are not exposed for
          # fork-originated PRs, so this step will be skipped for forks.
          if [ -z "${GATEWAY_URL:-}" ] || [ -z "${GATEWAY_TOKEN:-}" ]; then
            echo "Gateway URL/token not available (likely a fork PR); skipping notification."
            exit 0
          fi

          # Build JSON safely with jq so PR title/URL cannot break out of the
          # string or inject extra fields.
          PAYLOAD=$(jq -n \
            --arg agentId "main" \
            --arg ticket "$TICKET" \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_url "$PR_URL" \
            '{
              agentId: $agentId,
              message: ("PR opened: #" + $pr_number + " for " + $ticket + "\n\nTitle: " + $pr_title + "\nURL: " + $pr_url + "\n\nSpawn reviewer agent to review this PR."),
              metadata: {
                source: "github_actions",
                pr_number: ($pr_number | tonumber),
                ticket: $ticket
              }
            }')

          # `--fail` makes curl exit non-zero on HTTP >=400 so workflow
          # surfaces gateway errors instead of silently passing.
          curl --fail --show-error --silent \
            -X POST "$GATEWAY_URL/api/sessions/message" \
            -H "Authorization: Bearer $GATEWAY_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD"

  trigger-qa:
    name: Spawn QA Agent
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Extract Linear ticket ID
        id: linear
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          # Inputs passed via env vars to avoid shell injection.
          TICKET=$(printf '%s %s' "$PR_TITLE" "$PR_HEAD_REF" | grep -oE 'LIF-[0-9]+' | head -1 || echo "")
          echo "ticket=$TICKET" >> "$GITHUB_OUTPUT"
          echo "Found ticket: $TICKET"

      - name: Notify OpenClaw Gateway
        if: steps.linear.outputs.ticket != ''
        env:
          GATEWAY_URL: ${{ secrets.OPENCLAW_GATEWAY_URL }}
          GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          TICKET: ${{ steps.linear.outputs.ticket }}
        run: |
          if [ -z "${GATEWAY_URL:-}" ] || [ -z "${GATEWAY_TOKEN:-}" ]; then
            echo "Gateway URL/token not configured; skipping notification."
            exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg agentId "main" \
            --arg ticket "$TICKET" \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_url "$PR_URL" \
            '{
              agentId: $agentId,
              message: ("PR merged: #" + $pr_number + " for " + $ticket + "\n\nTitle: " + $pr_title + "\nURL: " + $pr_url + "\n\nSpawn QA agent to test this change."),
              metadata: {
                source: "github_actions",
                pr_number: ($pr_number | tonumber),
                ticket: $ticket,
                merged: true
              }
            }')

          curl --fail --show-error --silent \
            -X POST "$GATEWAY_URL/api/sessions/message" \
            -H "Authorization: Bearer $GATEWAY_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD"
