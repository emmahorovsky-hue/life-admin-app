<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons & app icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#161616" />

    <!-- Preload the hero illustration (LCP element) so it downloads in parallel
         with the JS bundle instead of waiting for React to mount. -->
    <link rel="preload" as="image" href="/hero-desk.webp" fetchpriority="high" />

    <title>Paypr - Never miss a renewal</title>
    <meta
      name="description"
      content="Track subscriptions, contracts, warranties, and leases on one timeline. Never miss a renewal or forget what you've committed to."
    />

    <!-- Open Graph / social share -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Paypr" />
    <meta property="og:title" content="Paypr - Never miss a renewal" />
    <meta
      property="og:description"
      content="Track subscriptions, contracts, warranties, and leases on one timeline. Never miss a renewal or forget what you've committed to."
    />
    <meta property="og:url" content="https://paypr.live/" />
    <meta property="og:image" content="https://paypr.live/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Paypr - Never miss a renewal" />
    <meta
      name="twitter:description"
      content="Track subscriptions, contracts, warranties, and leases on one timeline. Never miss a renewal or forget what you've committed to."
    />
    <meta name="twitter:image" content="https://paypr.live/og-image.png" />
  </head>
  <body>
    <!-- FOUC guard: apply the cached theme before first paint. Mirrors
         ThemeProvider (src/contexts/ThemeContext.tsx) — keep the key and the
         resolution logic in sync. -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('paypr-theme');
          var dark =
            theme === 'dark' ||
            (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          /* default to light */
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
